<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">`
</head>
<body>
  <!-- Header -->
  <header>
    <h1>CHORES</h1>
  </header>

  <!-- Form Tambah Tugas -->
  <section id="add-task">
    <input type="text" id="task-input" placeholder="Tambahkan tugas baru...">
    <input type="date" id="due-date">
    <button id="add-btn">+</button>
  </section>

  <!-- Daftar TO DO -->
  <section id="todo-section">
    <h2>TO DO</h2>
    <ul id="todo-list">
      <!-- Contoh item -->
      <!--
      <li>
        <input type="checkbox">
        <span>Pick up mail</span>
        <span class="due">Due today</span>
        <button class="delete-btn">Hapus</button>
      </li>
      -->
    </ul>
  </section>

  <!-- Daftar COMPLETED -->
  <section id="completed-section">
    <h2>COMPLETED</h2>
    <ul id="completed-list">
      <!-- Item selesai akan pindah ke sini -->
    </ul>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 To-Do List App</p>
  </footer>
</body>
</html>
